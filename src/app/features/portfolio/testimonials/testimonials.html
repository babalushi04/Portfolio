<section class="testimonials" id="testimonials">
  <div class="testimonials-inner">
    <p class="section-label">{{ 'TESTIMONIALS.LABEL' | translate }}</p>
    <h2 class="section-title">{{ 'TESTIMONIALS.TITLE' | translate }}</h2>

    <div class="slider-wrapper">
      <div class="slider-track" [style.transform]="'translateX(calc(-' + activeIndex + ' * 100% / 3))'">
        @for (t of testimonials; track t.author; let i = $index) {
          <div class="testimonial-card" [class.active]="i === activeIndex">
            <div class="quote-icon">&ldquo;</div>
            <p class="quote-text">{{ getQuote(t) }}</p>
            <div class="quote-divider"></div>
            <div class="author-info">
              <strong class="author-name">{{ t.author }}</strong>
              <span class="author-role">{{ t.role }} · {{ t.project }}</span>
            </div>
          </div>
        }
      </div>
    </div>

    <div class="slider-controls">
      <button type="button" class="ctrl-arrow" (click)="prev()" aria-label="Previous" title="Previous testimonial">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      </button>
      <div class="ctrl-dots">
        @for (t of testimonials; track t.author; let i = $index) {
          <button
            type="button"
            class="ctrl-dot"
            [class.active]="i === activeIndex"
            (click)="goTo(i)"
            [attr.aria-label]="'Testimonial ' + (i + 1)"
            title="Testimonial"
          ></button>
        }
      </div>
      <button type="button" class="ctrl-arrow" (click)="next()" aria-label="Next" title="Next testimonial">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
    </div>
  </div>
</section>
