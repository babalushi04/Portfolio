<header class="header" [class.scrolled]="isScrolled">
  <div class="header-inner">

    <!-- Desktop: left side (lang + nav) | Mobile: hidden -->
    <div class="header-left">
      <div class="lang-pill">
        <button type="button" class="lang-btn" [class.active]="langService.getCurrentLang() === 'en'" (click)="langService.setLanguage('en')">EN</button>
        <button type="button" class="lang-btn" [class.active]="langService.getCurrentLang() === 'de'" (click)="langService.setLanguage('de')">DE</button>
      </div>
      <nav class="nav-desktop">
        <a (click)="scrollTo('about')"    class="nav-link">{{ 'NAV.ABOUT'    | translate }}</a>
        <a (click)="scrollTo('skills')"   class="nav-link">{{ 'NAV.SKILLS'   | translate }}</a>
        <a (click)="scrollTo('projects')" class="nav-link">{{ 'NAV.PROJECTS' | translate }}</a>
      </nav>
    </div>

    <!-- Logo: right on desktop, left on mobile via order -->
    <a class="logo" (click)="scrollTo('hero')">
      <span class="logo-name">Virxhin</span>
      <svg class="logo-brackets" viewBox="0 0 80 48" fill="none" aria-hidden="true">
        <path class="bracket-path" d="M28 4 L6 24 L28 44"  stroke-width="7" stroke-linecap="square" stroke-linejoin="miter"/>
        <path class="bracket-path" d="M52 4 L74 24 L52 44" stroke-width="7" stroke-linecap="square" stroke-linejoin="miter"/>
      </svg>
      <span class="logo-name">Bytyqi</span>
    </a>

    <!-- Hamburger: hidden on desktop, right on mobile -->
    <button type="button" class="hamburger" [class.open]="menuOpen" (click)="toggleMenu()" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>

  </div>
</header>

<!-- Mobile dropdown card — outside <header> to avoid backdrop-filter containing-block bug -->
<nav class="nav-mobile" [class.open]="menuOpen">
  <a (click)="scrollTo('about');    closeMenu()" class="nav-link">{{ 'NAV.ABOUT'    | translate }}</a>
  <a (click)="scrollTo('skills');   closeMenu()" class="nav-link">{{ 'NAV.SKILLS'   | translate }}</a>
  <a (click)="scrollTo('projects'); closeMenu()" class="nav-link">{{ 'NAV.PROJECTS' | translate }}</a>
  <div class="mobile-lang">
    <div class="lang-pill">
      <button type="button" class="lang-btn" [class.active]="langService.getCurrentLang() === 'en'" (click)="langService.setLanguage('en')">EN</button>
      <button type="button" class="lang-btn" [class.active]="langService.getCurrentLang() === 'de'" (click)="langService.setLanguage('de')">DE</button>
    </div>
  </div>
</nav>
