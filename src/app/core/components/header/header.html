<header class="header" [class.scrolled]="isScrolled">
  <div class="header-inner">

    <!-- Desktop left: lang toggle + nav -->
    <div class="header-left">
      <div class="language-toggle" (click)="langService.setLanguage(langService.getCurrentLang() === 'en' ? 'de' : 'en')">
        <button type="button" class="lang-slider-btn" [class.german]="langService.getCurrentLang() === 'de'">
          <div class="lang-slider" [class.german]="langService.getCurrentLang() === 'de'"></div>
          <span class="lang-option en" [class.active]="langService.getCurrentLang() === 'en'">EN</span>
          <span class="lang-option de" [class.active]="langService.getCurrentLang() === 'de'">DE</span>
        </button>
      </div>
      <nav class="nav-desktop">
        <a (click)="scrollTo('about')"    class="nav-link">{{ 'NAV.ABOUT'    | translate }}</a>
        <a (click)="scrollTo('skills')"   class="nav-link">{{ 'NAV.SKILLS'   | translate }}</a>
        <a (click)="scrollTo('projects')" class="nav-link">{{ 'NAV.PROJECTS' | translate }}</a>
      </nav>
    </div>

    <!-- Logo: right on desktop, left on mobile -->
    <a class="logo" (click)="scrollTo('hero')">
      <span class="logo-name">Virxhin</span>
      <svg class="logo-brackets" viewBox="30 0 80 60" fill="none" aria-hidden="true">
        <path class="bracket-path" d="M55 10 L30 30 L55 50" stroke-width="12" stroke-linecap="square" stroke-linejoin="miter"/>
        <path class="bracket-path" d="M85 10 L110 30 L85 50" stroke-width="12" stroke-linecap="square" stroke-linejoin="miter"/>
      </svg>
      <span class="logo-name">Bytyqi</span>
    </a>

    <!-- Hamburger: hidden on desktop -->
    <button type="button" class="hamburger" [class.open]="menuOpen" (click)="toggleMenu()" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>

  </div>
</header>

<!-- Mobile overlay nav — outside <header> to avoid backdrop-filter containing-block bug -->
<nav class="nav-mobile" [class.open]="menuOpen">
  <a (click)="scrollTo('about');    closeMenu()" class="nav-link">{{ 'NAV.ABOUT'    | translate }}</a>
  <a (click)="scrollTo('skills');   closeMenu()" class="nav-link">{{ 'NAV.SKILLS'   | translate }}</a>
  <a (click)="scrollTo('projects'); closeMenu()" class="nav-link">{{ 'NAV.PROJECTS' | translate }}</a>
  <div class="mobile-lang">
    <div class="language-toggle" (click)="langService.setLanguage(langService.getCurrentLang() === 'en' ? 'de' : 'en')">
      <button type="button" class="lang-slider-btn" [class.german]="langService.getCurrentLang() === 'de'">
        <div class="lang-slider" [class.german]="langService.getCurrentLang() === 'de'"></div>
        <span class="lang-option en" [class.active]="langService.getCurrentLang() === 'en'">EN</span>
        <span class="lang-option de" [class.active]="langService.getCurrentLang() === 'de'">DE</span>
      </button>
    </div>
  </div>
</nav>
